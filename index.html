<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insta-Free Tracker</title>

<style>
body { margin:0; font-family: Arial, sans-serif; background:#0f172a; color:white; }
.container { padding:20px; }
.header { display:flex; justify-content:space-between; align-items:center; }

/* HEATMAP CONTAINER (centered + proper width) */
.heatmap-wrapper {
  margin-top:20px;
  overflow-x:auto;
}

.heatmap {
  display:inline-block;
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

.months {
  display:flex;
  position:relative;
  height:20px;
  margin-bottom:6px;
  color:#94a3b8;
  font-size:12px;
}

.months span {
  position:absolute;
}

.grid {
  display:grid;
  grid-template-rows: repeat(7, 12px);
  grid-auto-flow: column;
  gap:4px;
}

.cell {
  width:12px;
  height:12px;
  border-radius:2px;
  background:#334155;
}

.cell.active { background:#ef4444; }
.cell.fail { background:#000; }

/* CENTER ACTION */
.action {
  text-align:center;
  margin-top:40px;
}

button {
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}
.success { background:#22c55e; color:white; }
.failbtn { background:#ef4444; color:white; }

</style>
</head>

<body>

<div class="container">

<div class="header">
  <h2>🚫 Insta-Free Tracker</h2>
</div>

<div class="heatmap-wrapper">
  <div class="heatmap">
    <div class="months" id="months"></div>
    <div id="grid" class="grid"></div>
  </div>
</div>

<div class="action">
  <h2>Have you used Instagram today?</h2>
  <button class="success" onclick="mark(1)">Day Completed ✅</button>
  <button class="failbtn" onclick="mark(0)">I failed ❌</button>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || {};

function today(){ return new Date().toISOString().split("T")[0]; }

function mark(val){
  data[today()] = val;
  localStorage.setItem("data", JSON.stringify(data));
  render();
}

function render(){
  const grid=document.getElementById("grid");
  const months=document.getElementById("months");
  grid.innerHTML="";
  months.innerHTML="";

  let end=new Date();
  let start=new Date();
  start.setDate(end.getDate()-364);

  let days=[];
  for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
    days.push(new Date(d));
  }

  // align to sunday
  while(days[0].getDay()!==0){
    days.unshift(new Date(days[0].getTime()-86400000));
  }

  let monthPositions={};

  days.forEach((d,i)=>{
    let key=d.toISOString().split("T")[0];

    if(d.getDate()===1){
      monthPositions[Math.floor(i/7)] = d.toLocaleString('default',{month:'short'});
    }

    let div=document.createElement("div");
    div.className="cell";

    if(data[key]===1) div.classList.add("active");
    if(data[key]===0) div.classList.add("fail");

    grid.appendChild(div);
  });

  Object.keys(monthPositions).forEach(col=>{
    let span=document.createElement("span");
    span.innerText=monthPositions[col];
    span.style.left=(col*16)+"px";
    months.appendChild(span);
  });
}

render();
</script>

</body>
</html>
