<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insta-Free Tracker</title>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel standalone to transpile JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#1a1a1a] text-gray-200">
  
  <div id="root"></div>

  <!-- Main Application Script -->
  <script type="text/babel" data-type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    const { useState, useEffect, useMemo, useRef } = React;

    // --- INSTRUCTIONS FOR GITHUB PAGES ---
    // Replace this object with your actual Firebase configuration keys from the Firebase Console!
    const defaultFirebaseConfig = {
      apiKey: "YOUR_API_KEY_HERE",
      authDomain: "YOUR_AUTH_DOMAIN_HERE",
      projectId: "YOUR_PROJECT_ID_HERE",
      storageBucket: "YOUR_STORAGE_BUCKET_HERE",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID_HERE",
      appId: "YOUR_APP_ID_HERE"
    };

    // Safely load config (supports both local GitHub hosting and isolated preview environments)
    const firebaseConfig = typeof __firebase_config !== 'undefined' 
      ? JSON.parse(__firebase_config) 
      : defaultFirebaseConfig;

    const appId = typeof __app_id !== 'undefined' ? __app_id : 'insta-detox-tracker';

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- Inline SVG Icons (Replacing Lucide dependencies for pure HTML compatibility) ---
    const InstagramIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"></line></svg>);
    const ShieldCheckIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2-1 4-3 6-3s4 2 6 3a1 1 0 0 1 1 1z"></path><path d="m9 12 2 2 4-4"></path></svg>);
    const FlameIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path></svg>);
    const TrophyIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>);
    const InfoIcon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>);
    const CheckCircle2Icon = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="m9 12 2 2 4-4"></path></svg>);

    // --- Main React Component ---
    function App() {
      const [user, setUser] = useState(null);
      const [streakData, setStreakData] = useState({
        history: [], 
        maxStreak: 0,
        currentStreak: 0,
        lastCheckIn: null
      });
      const [loading, setLoading] = useState(true);

      // --- Auth Logic ---
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              // Standard anonymous fallback for GitHub pages
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("Auth failed. Ensure anonymous sign-in is enabled in Firebase:", error);
            setLoading(false); // Stop loading if auth completely fails
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      // --- Firestore Sync ---
      useEffect(() => {
        if (!user) return;

        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'streakStats', 'main');
        const unsubscribe = onSnapshot(docRef, (docSnap) => {
          if (docSnap.exists()) {
            setStreakData(docSnap.data());
          }
          setLoading(false);
        }, (error) => {
          console.error("Snapshot error:", error);
          setLoading(false);
        });

        return () => unsubscribe();
      }, [user]);

      // --- Logic Helpers ---
      const formatDateStr = (date) => {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      };

      const getTodayStr = () => formatDateStr(new Date());

      const handleCheckIn = async () => {
        if (!user) return;
        const today = getTodayStr();
        
        if (streakData.history.includes(today)) return;

        const newHistory = [...streakData.history, today].sort();
        
        let current = 0;
        let max = streakData.maxStreak;
        
        const sortedHistory = [...newHistory];
        let calculatedCurrent = 0;

        const dateSet = new Set(sortedHistory);
        let checkDate = new Date(); 
        while (dateSet.has(formatDateStr(checkDate))) {
          calculatedCurrent++;
          checkDate.setDate(checkDate.getDate() - 1);
        }

        let globalMax = max;
        const allDates = Array.from(dateSet).sort();
        if (allDates.length > 0) {
          let temp = 1;
          for (let i = 1; i < allDates.length; i++) {
            const d1 = new Date(allDates[i-1]);
            const d2 = new Date(allDates[i]);
            const diff = Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
            if (diff === 1) {
              temp++;
            } else {
              globalMax = Math.max(globalMax, temp);
              temp = 1;
            }
          }
          globalMax = Math.max(globalMax, temp);
        }

        const newData = {
          history: newHistory,
          currentStreak: calculatedCurrent,
          maxStreak: Math.max(globalMax, calculatedCurrent),
          lastCheckIn: today
        };

        await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'streakStats', 'main'), newData);
      };

      // --- Activity Map Generator ---
      const scrollRef = useRef(null);

      const activityMap = useMemo(() => {
        const months = [];
        const end = new Date();
        end.setHours(0, 0, 0, 0); 
        
        const start = new Date(end);
        start.setDate(start.getDate() - 364); // Exact 1 year ago

        const historySet = new Set(streakData.history);
        let currentMonthBlock = null;

        for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
          const currentMonthNum = d.getMonth();
          const currentYear = d.getFullYear();

          // Create a new block if the month changes
          if (!currentMonthBlock || currentMonthBlock.monthNum !== currentMonthNum) {
            if (currentMonthBlock) {
              // Pad the end of the previous month so columns align
              let lastWeek = currentMonthBlock.weeks[currentMonthBlock.weeks.length - 1];
              while (lastWeek.length < 7) lastWeek.push(null);
              months.push(currentMonthBlock);
            }

            currentMonthBlock = {
              monthNum: currentMonthNum,
              year: currentYear,
              label: d.toLocaleString('default', { month: 'short' }),
              weeks: [[]]
            };

            // Pad the start of the new month to align the first day to its correct weekday
            const startDayOfWeek = d.getDay();
            for (let i = 0; i < startDayOfWeek; i++) {
              currentMonthBlock.weeks[0].push(null);
            }
          }

          const dateStr = formatDateStr(d); 
          let currentWeek = currentMonthBlock.weeks[currentMonthBlock.weeks.length - 1];
          
          // Move to next column within the month block if the week is full
          if (currentWeek.length === 7) {
            currentMonthBlock.weeks.push([]);
            currentWeek = currentMonthBlock.weeks[currentMonthBlock.weeks.length - 1];
          }

          currentWeek.push({
            date: dateStr,
            active: historySet.has(dateStr),
            formattedDate: d.toLocaleDateString('default', { month: 'short', day: 'numeric', year: 'numeric' })
          });
        }
        
        // Push the very last month
        if (currentMonthBlock) {
          let lastWeek = currentMonthBlock.weeks[currentMonthBlock.weeks.length - 1];
          while (lastWeek.length < 7) lastWeek.push(null);
          months.push(currentMonthBlock);
        }
        
        return months;
      }, [streakData.history]);

      useEffect(() => {
        if (scrollRef.current) {
          scrollRef.current.scrollLeft = scrollRef.current.scrollWidth;
        }
      }, [activityMap]);

      if (loading) {
        return (
          <div className="min-h-screen bg-[#1a1a1a] flex items-center justify-center text-gray-400">
            <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-[#39d353]"></div>
          </div>
        );
      }

      const isCheckedToday = streakData.history.includes(getTodayStr());

      return (
        <div className="min-h-screen bg-[#1a1a1a] text-gray-200 font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-8">
            
            {/* Header Section */}
            <header className="flex flex-col md:flex-row md:items-center justify-between gap-6 bg-[#282828] p-6 rounded-xl border border-white/5 shadow-2xl">
              <div className="flex items-center gap-4">
                <div className="p-3 bg-gradient-to-br from-[#006d32] to-[#39d353] rounded-lg shadow-lg">
                  <InstagramIcon className="text-white w-8 h-8" />
                </div>
                <div>
                  <h1 className="text-2xl font-bold bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">
                    Insta-Free Tracker
                  </h1>
                  <p className="text-sm text-gray-400 flex items-center gap-1">
                    <ShieldCheckIcon className="w-3 h-3 text-[#39d353]" />
                    Your discipline dashboard
                  </p>
                </div>
              </div>

              <div className="flex gap-4">
                <div className="bg-[#333] px-4 py-2 rounded-lg border border-white/5 flex flex-col items-center min-w-[100px]">
                  <span className="text-xs text-gray-500 uppercase font-bold tracking-wider">Current</span>
                  <div className="flex items-center gap-1 text-[#39d353]">
                    <FlameIcon className="w-5 h-5 text-[#39d353]" />
                    <span className="text-xl font-black">{streakData.currentStreak}</span>
                  </div>
                </div>
                <div className="bg-[#333] px-4 py-2 rounded-lg border border-white/5 flex flex-col items-center min-w-[100px]">
                  <span className="text-xs text-gray-500 uppercase font-bold tracking-wider">Max</span>
                  <div className="flex items-center gap-1 text-yellow-500">
                    <TrophyIcon className="w-5 h-5 text-yellow-500" />
                    <span className="text-xl font-black">{streakData.maxStreak}</span>
                  </div>
                </div>
              </div>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
              
              {/* Main Action Area */}
              <div className="lg:col-span-2 space-y-6">
                
                {/* The Activity Heatmap */}
                <div className="bg-[#282828] p-6 rounded-xl border border-white/5 shadow-xl overflow-hidden">
                  <div className="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                    <div className="flex items-center gap-4 text-sm text-gray-400">
                      <span>Total active days: <strong className="text-white font-semibold">{streakData.history.length}</strong></span>
                      <span>Max streak: <strong className="text-white font-semibold">{streakData.maxStreak}</strong></span>
                    </div>
                    <div className="flex items-center gap-2 text-[10px] text-gray-500">
                      <span>Less</span>
                      <div className="w-3 h-3 rounded-sm bg-[#333]"></div>
                      <div className="w-3 h-3 rounded-sm bg-[#0e4429]"></div>
                      <div className="w-3 h-3 rounded-sm bg-[#006d32]"></div>
                      <div className="w-3 h-3 rounded-sm bg-[#26a641]"></div>
                      <div className="w-3 h-3 rounded-sm bg-[#39d353]"></div>
                      <span>More</span>
                    </div>
                  </div>

                  <div className="overflow-x-auto pb-4 scroll-smooth" ref={scrollRef}>
                    <div className="flex gap-3" style={{ width: 'max-content' }}>
                      {activityMap.map((monthBlock, mIdx) => (
                        <div key={`month-block-${mIdx}`} className="flex flex-col gap-2">
                          <div className="flex gap-1">
                            {monthBlock.weeks.map((week, wIdx) => (
                              <div key={`week-${wIdx}`} className="flex flex-col gap-1">
                                {week.map((day, dIdx) => {
                                  // Invisible padding squares to keep the grid aligned properly
                                  if (!day) return <div key={`empty-${dIdx}`} className="w-3 h-3" />;
                                  return (
                                    <div
                                      key={day.date}
                                      title={`${day.formattedDate}: ${day.active ? 'Successful' : 'No Activity'}`}
                                      className={`w-3 h-3 rounded-sm transition-colors cursor-pointer hover:ring-1 hover:ring-white/20 ${
                                        day.active ? 'bg-[#39d353]' : 'bg-[#333]'
                                      }`}
                                    />
                                  );
                                })}
                              </div>
                            ))}
                          </div>
                          {/* Month Label aligned precisely under the block */}
                          <span className="text-[11px] text-gray-400 pl-1">{monthBlock.label}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                  <p className="mt-4 text-[11px] text-gray-500 italic flex items-center gap-1">
                    <InfoIcon className="w-3 h-3" />
                    Tracking 365 days of digital freedom
                  </p>
                </div>

                {/* Daily Log Button */}
                <div className="bg-[#282828] p-8 rounded-xl border border-white/5 shadow-xl flex flex-col items-center justify-center space-y-4 text-center">
                    <h3 className="text-xl font-bold">Have you used Instagram today?</h3>
                    <p className="text-gray-400 max-w-sm">Honesty is key. If you didn't open the app today, log your progress.</p>
                    
                    <button
                      onClick={handleCheckIn}
                      disabled={isCheckedToday}
                      className={`group relative px-10 py-4 rounded-full font-bold text-lg transition-all transform active:scale-95 flex items-center gap-3 ${
                        isCheckedToday 
                        ? 'bg-green-500/10 text-[#39d353] border border-green-500/50 cursor-default' 
                        : 'bg-[#26a641] hover:bg-[#39d353] text-white shadow-[0_0_20px_rgba(38,166,65,0.3)] hover:shadow-[0_0_30px_rgba(57,211,83,0.5)]'
                      }`}
                    >
                      {isCheckedToday ? (
                        <>
                          <CheckCircle2Icon className="w-6 h-6" />
                          Day Completed
                        </>
                      ) : (
                        <>
                          <ShieldCheckIcon className="w-6 h-6 group-hover:animate-pulse" />
                          Mark Day as Clean
                        </>
                      )}
                    </button>
                    {isCheckedToday && (
                      <p className="text-xs text-green-600 font-medium">Nicely done! Come back tomorrow to keep the flame alive.</p>
                    )}
                </div>
              </div>

              {/* Sidebar Info */}
              <div className="space-y-6">
                <div className="bg-[#282828] p-6 rounded-xl border border-white/5 shadow-xl">
                  <h3 className="text-sm font-bold text-gray-400 mb-4 uppercase tracking-widest">Detox Milestones</h3>
                  <ul className="space-y-4">
                    {[
                      { label: "Bronze Medal", requirement: "3 Days", reached: streakData.maxStreak >= 3 },
                      { label: "Silver Medal", requirement: "7 Days", reached: streakData.maxStreak >= 7 },
                      { label: "Gold Medal", requirement: "14 Days", reached: streakData.maxStreak >= 14 },
                      { label: "Digital Monk", requirement: "30 Days", reached: streakData.maxStreak >= 30 }
                    ].map((m, i) => (
                      <li key={i} className="flex items-center justify-between group">
                        <span className={`text-sm ${m.reached ? 'text-white' : 'text-gray-500'}`}>{m.label}</span>
                        <div className={`px-2 py-1 rounded text-[10px] font-bold ${m.reached ? 'bg-green-500/20 text-green-500' : 'bg-[#333] text-gray-600'}`}>
                          {m.requirement}
                        </div>
                      </li>
                    ))}
                  </ul>
                </div>

                <div className="bg-gradient-to-br from-indigo-600 to-purple-700 p-6 rounded-xl shadow-xl">
                  <h3 className="text-lg font-bold text-white mb-2">Why detox?</h3>
                  <p className="text-sm text-indigo-100 leading-relaxed italic">
                    "The price of anything is the amount of life you exchange for it."
                  </p>
                  <div className="mt-4 pt-4 border-t border-white/10 text-[10px] text-indigo-200">
                    Logged user ID: <span className="font-mono">{user?.uid || "Loading..."}</span>
                  </div>
                </div>
              </div>

            </div>

            <footer className="text-center text-gray-600 text-[11px] pb-8">
              LeetCode Inspired Design • Built for Digital Wellbeing
            </footer>
          </div>
        </div>
      );
    }

    // Render the App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
