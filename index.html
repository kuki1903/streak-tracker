<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insta-Free Tracker</title>

<style>
body { margin:0; font-family: Arial, sans-serif; background:#0f172a; color:white; }
.container { padding:20px; }
.header { display:flex; justify-content:space-between; align-items:center; background:#1e293b; padding:20px; border-radius:12px; }
.stats { display:flex; gap:15px; }
.stat { background:#111827; padding:10px 20px; border-radius:10px; text-align:center; }
.main { margin-top:20px; }

/* Heatmap */
.heatmap { background:#1e293b; padding:20px; border-radius:12px; }
.months { display:flex; font-size:12px; color:#94a3b8; margin-bottom:8px; }
.months span { width:52px; }

.grid {
  display:grid;
  grid-template-rows: repeat(7, 12px);
  grid-auto-flow: column;
  gap:4px;
}

.cell {
  width:12px;
  height:12px;
  border-radius:2px;
  background:#334155;
}

/* SUCCESS (red shades like your requirement) */
.cell.level1 { background:#7f1d1d; }
.cell.level2 { background:#991b1b; }
.cell.level3 { background:#b91c1c; }
.cell.level4 { background:#ef4444; }

/* FAILED day = BLACK */
.cell.fail { background:#000000; }

.panel { background:#1e293b; padding:20px; border-radius:12px; margin-top:20px; }
.action { background:#1e293b; padding:25px; border-radius:12px; margin-top:20px; text-align:center; }
button { padding:10px 20px; margin:10px; border:none; border-radius:20px; font-size:15px; cursor:pointer; }
.success { background:#22c55e; color:white; }
.failbtn { background:#ef4444; color:white; }
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div>
    <h2>🚫 Insta-Free Tracker</h2>
    <p>Your discipline dashboard</p>
  </div>
  <div class="stats">
    <div class="stat">CURRENT<br><b id="current">0</b></div>
    <div class="stat">MAX<br><b id="max">0</b></div>
  </div>
</div>

<div class="main">
  <div class="heatmap">
    <div class="months" id="months"></div>
    <div id="grid" class="grid"></div>
  </div>
</div>

<div class="action">
  <h2>Have you used Instagram today?</h2>
  <button class="success" onclick="mark(1)">Day Completed ✅</button>
  <button class="failbtn" onclick="mark(0)">I failed ❌</button>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || {};

function today(){ return new Date().toISOString().split("T")[0]; }

function mark(val){
  data[today()] = val;
  localStorage.setItem("data", JSON.stringify(data));
  render();
}

function currentStreak(){
  let d = new Date();
  let count = 0;
  while(true){
    let key = d.toISOString().split("T")[0];
    if(data[key] === 1){ count++; d.setDate(d.getDate()-1); }
    else break;
  }
  return count;
}

function maxStreak(){
  let max=0,curr=0;
  Object.keys(data).sort().forEach(k=>{
    if(data[k]===1){ curr++; max=Math.max(max,curr);} else curr=0;
  });
  return max;
}

function getLevel(streakLen){
  if(streakLen>=20) return "level4";
  if(streakLen>=10) return "level3";
  if(streakLen>=5) return "level2";
  return "level1";
}

function render(){
  document.getElementById("current").innerText = currentStreak();
  document.getElementById("max").innerText = maxStreak();

  const grid = document.getElementById("grid");
  const monthsDiv = document.getElementById("months");
  grid.innerHTML = "";
  monthsDiv.innerHTML = "";

  let todayDate = new Date();
  let start = new Date();
  start.setDate(todayDate.getDate() - 364);

  let currentMonth = -1;
  let streak = 0;

  for(let i=0;i<365;i++){
    let d = new Date(start);
    d.setDate(start.getDate()+i);
    let key = d.toISOString().split("T")[0];

    // Month labels
    if(d.getMonth() !== currentMonth){
      currentMonth = d.getMonth();
      let span = document.createElement("span");
      span.innerText = d.toLocaleString('default',{month:'short'});
      monthsDiv.appendChild(span);
    }

    let div = document.createElement("div");
    div.className = "cell";

    if(data[key] === 1){
      streak++;
      div.classList.add(getLevel(streak));
    } else if(data[key] === 0){
      streak = 0; // reset streak
      div.classList.add("fail");
    } else {
      streak = 0;
    }

    grid.appendChild(div);
  }
}

render();
</script>

</body>
</html>
