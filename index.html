<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insta-Free Tracker</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

.container {
    padding: 20px;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
}

.stats {
    display: flex;
    gap: 15px;
}

.stat {
    background: #111827;
    padding: 10px 20px;
    border-radius: 10px;
    text-align: center;
}

/* Layout */
.main {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
    margin-top: 20px;
}

/* Heatmap */
.heatmap {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(30, 12px);
    gap: 6px;
    margin-top: 15px;
}

.cell {
    width: 12px;
    height: 12px;
    background: #334155;
    border-radius: 3px;
}

.cell.active {
    background: #22c55e;
}

/* Side panel */
.panel {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
}

/* Action box */
.action {
    background: #1e293b;
    padding: 25px;
    border-radius: 12px;
    margin-top: 20px;
    text-align: center;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 20px;
    font-size: 15px;
    cursor: pointer;
}

.success {
    background: #22c55e;
    color: white;
}

.fail {
    background: #ef4444;
    color: white;
}
</style>
</head>

<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <div>
            <h2>🚫 Insta-Free Tracker</h2>
            <p>Your discipline dashboard</p>
        </div>

        <div class="stats">
            <div class="stat">
                CURRENT<br><b id="current">0</b>
            </div>
            <div class="stat">
                MAX<br><b id="max">0</b>
            </div>
        </div>
    </div>

    <!-- Main -->
    <div class="main">

        <div class="heatmap">
            <h3>Activity</h3>
            <div id="grid" class="grid"></div>
        </div>

        <div class="panel">
            <h3>Milestones</h3>
            <p>🥉 3 days</p>
            <p>🥈 7 days</p>
            <p>🥇 14 days</p>
            <p>🧘 30 days</p>
        </div>

    </div>

    <!-- Action -->
    <div class="action">
        <h2>Have you used Instagram today?</h2>
        <button class="success" onclick="mark(1)">Day Completed ✅</button>
        <button class="fail" onclick="mark(0)">I failed ❌</button>
    </div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || {};

function today() {
    return new Date().toISOString().split("T")[0];
}

function mark(val) {
    data[today()] = val;
    localStorage.setItem("data", JSON.stringify(data));
    render();
}

function currentStreak() {
    let d = new Date();
    let count = 0;

    while (true) {
        let key = d.toISOString().split("T")[0];
        if (data[key] === 1) {
            count++;
            d.setDate(d.getDate() - 1);
        } else break;
    }
    return count;
}

function maxStreak() {
    let max = 0, curr = 0;
    Object.keys(data).sort().forEach(k => {
        if (data[k] === 1) {
            curr++;
            max = Math.max(max, curr);
        } else curr = 0;
    });
    return max;
}

function render() {
    document.getElementById("current").innerText = currentStreak();
    document.getElementById("max").innerText = maxStreak();

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    for (let i = 0; i < 120; i++) {
        let d = new Date();
        d.setDate(d.getDate() - i);
        let key = d.toISOString().split("T")[0];

        let div = document.createElement("div");
        div.className = "cell";
        if (data[key] === 1) div.classList.add("active");

        grid.appendChild(div);
    }
}

render();
</script>

</body>
</html>
